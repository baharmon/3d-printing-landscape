[workspace]
authors = ["Brendan Harmon <brendan.harmon@gmail.com>"]
repository = "https://github.com/baharmon/3d-printing-landscape"
channels = ["conda-forge"]
name = "3d-printing-landscape"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
version = "1.0.0"
license = "MIT"

[tasks]

[dependencies]
python = ">=3.14.6,<3.15"
numpy = ">=2.5.0,<3"
open3d = ">=0.19.0,<0.20"
pymeshfix = ">=0.18.1,<0.19"
jupyterlab = ">=4.6.1,<5"
dash = ">=4.2.0,<5"
spyder-kernels = ">=3.1.5,<4"
pyvista = ">=0.48.4,<0.49"
trame = ">=3.13.2,<4"
tqdm = ">=4.68.3,<5"
trame-vtk = ">=2.11.13,<3"
trame-vuetify = ">=3.2.2,<4"
trame-jupyter-extension = ">=2.1.4,<3"
meshio = ">=5.3.5,<6"
rtree = ">=1.4.1,<2"
trimesh = ">=4.12.2,<5"
ipywidgets = ">=8.1.8,<9"

[pypi-dependencies]
pyvista-cad = { version = ">=0.0.4, <0.0.5", extras = ["3mf"] }
nest-asyncio2 = ">=1.7.2, <2"